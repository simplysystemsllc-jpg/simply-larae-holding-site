kind = "web"
previewPath = "/"
title = "Simply LaRae"
version = "1.0.0"
id = "artifacts/simply-larae"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26035
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/simply-larae run dev"

[services.env]
PORT = "26035"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/simply-larae", "run", "build"]
publicDir = "artifacts/simply-larae/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
