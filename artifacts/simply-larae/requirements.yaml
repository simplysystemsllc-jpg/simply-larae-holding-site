packages:
  "framer-motion": "For premium smooth page transitions and step animations"
  "uuid": "For generating client-side session IDs for cart tracking"
  "react-dropzone": "For premium drag-and-drop selfie upload experience"
  "react-hook-form": "For complex multi-step intake questionnaire state management"
  "@hookform/resolvers": "For zod validation integration with react-hook-form"

images:
  - path: "artifacts/simply-larae/public/images/hero-abstract.png"
    description: "Soft elegant abstract gradient mesh in blush, rose, and taupe tones. Premium beauty brand aesthetic, minimal, smooth light leaks, feminine and calm, ultra-high resolution."
    aspect_ratio: "16:9"
  - path: "artifacts/simply-larae/public/images/about-editorial.png"
    description: "Soft focused abstract botanical elements and flowing silk fabric in blush and pearl colors. Luxury editorial photography style, calm and feminine, high-end fashion vibe."
    aspect_ratio: "3:4"

notes:
  - Session IDs are generated client-side using uuid and stored in localStorage.
  - The API does not have an upload endpoint defined, so the selfie upload step will simulate a delay and use a placeholder image URL to allow the flow to proceed to submission.
  - Using generated API hooks from @workspace/api-client-react as instructed.
